<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>課程報名系統 | GitHub Version</title>
  
  <!-- Bridge Connector to Google Sheets -->
  <script src="api.js"></script>
  
  <!-- Libraries -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
    
    body { 
      background-color: #f1f5f9; 
      font-family: 'Noto Sans TC', sans-serif; 
      margin: 0; 
      padding: 0; 
      overflow-x: hidden; 
    }
    
    label { 
      font-size: 1.25rem !important; 
      font-weight: 900 !important; 
      color: #0f172a !important; 
      display: block; 
      margin-bottom: 0.5rem; 
    }
    
    input, select { 
      font-size: 1.35rem !important; 
      width: 100%; 
      height: 4.5rem; 
      padding: 0 1.25rem; 
      border-radius: 1rem; 
      border: 4px solid #94a3b8; 
      color: #000; 
      background: #fff; 
    }
    
    input:focus { border-color: #2563eb; outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2); }
    
    .btn-primary {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: white;
      font-weight: 900;
      font-size: 1.5rem;
      padding: 1.25rem;
      border-radius: 1.25rem;
      width: 100%;
      transition: all 0.3s ease;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
    }
    
    .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
    
    .card {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      padding: 2rem;
    }

    .swal-custom-input {
      font-size: 1.5rem !important;
      height: 4rem !important;
      border: 3px solid #64748b !important;
    }
  </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex items-center justify-center">

  <!-- System Closed Overlay (Hidden by default) -->
  <div id="closed-screen" class="hidden fixed inset-0 bg-white z-50 flex flex-col items-center justify-center text-center p-6">
    <div class="text-black text-5xl md:text-7xl font-black leading-tight">
      系統已安全關閉<br>
      <span class="text-3xl md:text-4xl mt-4 block">System Closed Securely</span>
    </div>
  </div>

  <!-- Main Content -->
  <div id="main-container" class="max-w-2xl w-full hidden">
    <div class="card">
      <h1 class="text-4xl font-black text-slate-900 text-center mb-2">課程報名系統</h1>
      <p class="text-slate-500 text-center mb-8 font-bold">Course Registration System</p>
      
      <div id="app-content" class="space-y-6">
        <!-- Dynamic Content Injected Here -->
        <div class="flex justify-center items-center py-12">
          <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-slate-900"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let globalCourses = [];
    let currentUser = null;

    // 1. Initial System Check
    window.onload = async function() {
      try {
        const isOpen = await callGoogle("checkSystemStatus");
        if (!isOpen) {
          document.getElementById('closed-screen').classList.remove('hidden');
          return;
        }
        
        document.getElementById('main-container').classList.remove('hidden');
        renderVerificationStep();
      } catch (e) {
        Swal.fire("系統連線失敗", "請檢查網路設定或稍後再試", "error");
      }
    };

    // 2. Render Verification Step (Step 1: Member ID)
    function renderVerificationStep() {
      const content = document.getElementById('app-content');
      content.innerHTML = `
        <div class="space-y-4">
          <div>
            <label>會員編號 Member ID</label>
            <input type="number" id="member-id-input" placeholder="請輸入編號" inputmode="numeric">
          </div>
          <button onclick="handleInitialCheck()" class="btn-primary mt-4">下一步 / Next</button>
        </div>
      `;
    }

    // 3. Handle Initial ID Check
    async function handleInitialCheck() {
      const mid = document.getElementById('member-id-input').value;
      if (!mid) return Swal.fire("提示", "請輸入會員編號", "warning");

      Swal.fire({ title: '驗證中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      try {
        const check = await callGoogle("checkMemberAndRange", [mid]);
        
        if (check.type === 'INVALID') {
          Swal.fire("驗證失敗", "無效的會員編號", "error");
        } else if (check.type === 'NEW') {
          // New Member logic: proceed directly or with info form
          currentUser = { memberId: mid, isNew: true, name: "新會員 New Member" };
          proceedToCourseSelection();
        } else {
          // Existing Member: Need Birth Year
          promptForBirthYear(mid);
        }
      } catch (e) {
        Swal.fire("錯誤", e.message, "error");
      }
    }

    // 4. Prompt for Birth Year (For Existing Members)
    function promptForBirthYear(mid) {
      Swal.fire({
        title: '身分確認 / Verification',
        html: `
          <div class="text-left font-bold text-lg mb-2">請輸入出生年份 (西元)</div>
          <input type="number" id="swal-birth-year" class="swal2-input swal-custom-input" placeholder="例如: 1950" inputmode="numeric">
        `,
        confirmButtonText: '確認 / Confirm',
        preConfirm: () => {
          const year = document.getElementById('swal-birth-year').value;
          if (!year) return Swal.showValidationMessage('請輸入年份');
          return year;
        }
      }).then(async (result) => {
        if (result.isConfirmed) {
          verifyMemberData(mid, result.value);
        }
      });
    }

    // 5. Verify Member Details & Prompt for Contact Update
    async function verifyMemberData(mid, year) {
      Swal.fire({ title: '檢查資料...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      
      try {
        const info = await callGoogle("validateMemberWithDOB", [mid, year]);
        if (!info.success) throw new Error(info.message);

        // Success: Show update contact info dialog
        Swal.fire({
          title: `歡迎, ${info.name}`,
          html: `
            <div class="text-left space-y-4 p-2">
              <p class="font-bold text-slate-600">請確認或更新您的聯絡資訊：</p>
              <div>
                <label class="text-sm! font-bold! mb-1!">個人電話 Phone</label>
                <input id="u-phone" type="number" value="${info.phone}" class="swal-custom-input" inputmode="numeric">
              </div>
              <div>
                <label class="text-sm! font-bold! mb-1!">緊急聯絡人 Emergency Contact</label>
                <input id="u-em-name" type="text" value="${info.emName}" class="swal-custom-input">
              </div>
              <div>
                <label class="text-sm! font-bold! mb-1!">緊急電話 Emergency Phone</label>
                <input id="u-em-phone" type="number" value="${info.emPhone}" class="swal-custom-input" inputmode="numeric">
              </div>
            </div>
          `,
          confirmButtonText: '更新並報名 / Save & Continue',
          preConfirm: () => {
            return {
              phone: document.getElementById('u-phone').value,
              emName: document.getElementById('u-em-name').value,
              emPhone: document.getElementById('u-em-phone').value
            };
          }
        }).then(async (updateRes) => {
          if (updateRes.isConfirmed) {
            await callGoogle("updateMemberContactInfo", [mid, updateRes.value.phone, updateRes.value.emName, updateRes.value.emPhone]);
            currentUser = { memberId: mid, name: info.name, isNew: false };
            proceedToCourseSelection();
          }
        });
      } catch (e) {
        Swal.fire("錯誤", e.message, "error");
      }
    }

    // 6. Course Selection Logic
    async function proceedToCourseSelection() {
      const content = document.getElementById('app-content');
      content.innerHTML = `<div class="text-center py-10 font-bold">載入課程中 / Loading Courses...</div>`;
      
      try {
        const data = await callGoogle("getInitialData");
        globalCourses = data.courses;
        
        content.innerHTML = `
          <div class="space-y-6">
            <div class="bg-slate-100 p-4 rounded-xl font-black text-slate-700">
              會員 / User: ${currentUser.name} (${currentUser.memberId})
            </div>
            <div>
              <label>選擇課程 Select Course</label>
              <select id="course-select">
                <option value="">-- 請選擇課程 --</option>
                ${globalCourses.map(c => `<option value="${c.ID}">${c.CourseName}</option>`).join('')}
              </select>
            </div>
            <button onclick="submitRegistration()" class="btn-primary">確認報名 / Confirm Registration</button>
            <button onclick="location.reload()" class="text-slate-400 font-bold w-full py-2">返回 / Back</button>
          </div>
        `;
      } catch (e) {
        Swal.fire("錯誤", "無法獲取課程列表", "error");
      }
    }

    // 7. Final Registration Submission
    async function submitRegistration() {
      const courseId = document.getElementById('course-select').value;
      if (!courseId) return Swal.fire("提示", "請選擇課程", "warning");

      const course = globalCourses.find(c => c.ID.toString() === courseId.toString());

      Swal.fire({
        title: '確認報名?',
        text: `課程：${course.CourseName}`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: '提交 / Submit',
        cancelButtonText: '取消 / Cancel'
      }).then(async (result) => {
        if (result.isConfirmed) {
          Swal.fire({ title: '處理中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
          try {
            const res = await callGoogle("registerCourse", [currentUser.memberId, currentUser.name, courseId, course.CourseName]);
            if (res.success) {
              Swal.fire("成功", res.message, "success").then(() => location.reload());
            } else {
              Swal.fire("提示", res.message, "info");
            }
          } catch (e) {
            Swal.fire("錯誤", e.message, "error");
          }
        }
      });
    }
  </script>
</body>
</html>
