<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>課程報名系統 | 穩定版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="api.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
    body { background-color: #f1f5f9; font-family: 'Noto Sans TC', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
    
    label { font-size: 1.25rem !important; font-weight: 900 !important; color: #0f172a !important; display: block; margin-bottom: 0.5rem; }
    input, select { font-size: 1.35rem !important; width: 100%; height: 4.5rem; padding: 0 1.25rem; border-radius: 1rem; border: 4px solid #94a3b8; color: #000; background: #fff; transition: border-color 0.2s; }
    input:focus { border-color: #4f46e5; outline: none; }
    
    .btn-main { height: 5rem; font-size: 1.5rem; font-weight: 900; border-radius: 1.25rem; display: flex; align-items: center; justify-content: center; transition: all 0.1s; border: 4px solid transparent; cursor: pointer; }
    .btn-main:active { transform: scale(0.95); }
    
    .card { background: white; border-radius: 2rem; padding: 1.5rem; border: 3px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    .hidden { display: none !important; }
    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 50; display: flex; align-items: center; justify-content: center; }
    .swal-custom-input { font-size: 1.1rem !important; height: 3.5rem !important; margin: 0.5rem 0 !important; }
  </style>
</head>
<body>

  <!-- Startup Loading Screen -->
  <div id="loading-status" class="loading-overlay">
    <div class="text-center">
      <div class="inline-block animate-spin rounded-full h-14 w-14 border-4 border-indigo-600 border-t-transparent"></div>
      <p class="mt-4 font-black text-indigo-900 text-xl">初始化中...<br><span class="text-sm font-normal">Initializing...</span></p>
    </div>
  </div>

  <div class="min-h-screen px-4 pt-6 pb-10">
    <header class="text-center mb-8">
      <h1 class="text-3xl font-black text-indigo-900 tracking-tight">課程報名系統<br>
        <span class="text-xl font-bold opacity-70">Registration System</span>
      </h1>
    </header>

    <main class="max-w-2xl mx-auto space-y-6">
      <!-- Section 1: Authentication (Mid and Year) -->
      <section id="auth-section" class="card space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label>會員編號 (5位)</label>
            <input type="number" id="mid" placeholder="輸入編號" oninput="cInp(this, 5)" onkeydown="vKey(event)" inputmode="numeric">
          </div>
          <div>
            <label>出生年份 (YYYY)</label>
            <input type="number" id="birthYear" placeholder="例: 1955" oninput="cInp(this, 4)" onkeydown="vKey(event)" inputmode="numeric">
          </div>
        </div>
        <button id="login-btn" onclick="doLogin()" class="btn-main w-full bg-indigo-600 text-white shadow-xl shadow-indigo-200">確認登入 / Login</button>
      </section>

      <!-- Section 2: Registration (Hidden until Login) -->
      <section id="reg-section" class="hidden space-y-6">
        <div id="welcome-msg" class="text-2xl font-black text-center text-indigo-800 py-5 bg-indigo-50 rounded-2xl border-4 border-indigo-100"></div>
        
        <div class="card space-y-6">
          <div>
            <label>1. 選擇課程</label>
            <select id="courseSelect" onchange="onCourseChange()">
              <option value="">載入中...</option>
            </select>
            <p id="deadline" class="text-rose-600 font-bold mt-2 h-6 text-sm"></p>
          </div>

          <div id="dynamicQuestions" class="space-y-4 hidden"></div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-indigo-50 p-4 rounded-xl border-2 border-indigo-100">
              <label class="text-lg">個人電話 (Phone)</label>
              <input type="number" id="userPhone" oninput="cInp(this, 10)" onkeydown="vKey(event)" inputmode="numeric">
            </div>
            <div class="bg-slate-50 p-4 rounded-xl border-2 border-slate-100">
              <label class="text-lg">緊急聯絡人姓名</label>
              <input type="text" id="emeName" maxlength="30" class="mb-2">
              <label class="text-lg">緊急聯絡電話</label>
              <input type="number" id="emePhone" oninput="cInp(this, 10)" onkeydown="vKey(event)" inputmode="numeric">
            </div>
          </div>

          <button id="submit-btn" onclick="doSubmit()" class="btn-main w-full bg-emerald-600 text-white shadow-xl shadow-emerald-200">確認提交報名 / Submit</button>
        </div>
      </section>

      <!-- Bottom Utility Buttons -->
      <div id="bottom-utils" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <button id="btn-history" onclick="showHistory()" class="btn-main bg-white text-slate-700 border-4 border-slate-200 shadow-sm">查詢/取消報名</button>
        <button id="btn-update" onclick="handleUpdateContact()" class="btn-main bg-white text-slate-700 border-4 border-slate-200 shadow-sm">更新聯絡資料</button>
        <button id="btn-exit" onclick="confirmExit()" class="btn-main bg-slate-100 text-slate-500 col-span-1 md:col-span-2">登出系統 / Logout</button>
      </div>
    </main>
  </div>

  <script>
    let isRegistrationEnabled = true;
    let coursesData = [];

    window.onload = async function() {
      try {
        const res = await callGoogle('checkSystemStatus');
        isRegistrationEnabled = res.registrationEnabled;
        
        // Apply Flag Logic Silently
        if (!isRegistrationEnabled) {
          document.getElementById('login-btn').classList.add('hidden');
          document.getElementById('btn-history').classList.add('hidden');
          // Update button remains visible
        }

        document.getElementById('loading-status').classList.add('hidden');
      } catch (e) {
        document.getElementById('loading-status').innerHTML = '<div class="text-center"><p class="text-red-600 font-black text-xl">連線超時 Connection Timeout</p><button onclick="location.reload()" class="mt-4 px-6 py-2 bg-indigo-600 text-white rounded-lg">重試 / Retry</button></div>';
      }
    };

    /** Utility: Length Restrict & Numeric Only **/
    function cInp(el, len) { el.value = el.value.replace(/\D/g,'').slice(0, len); }
    function vKey(e) { if (['e', '+', '-', '.'].includes(e.key)) e.preventDefault(); }

    /** Exit Confirmation **/
    function confirmExit() {
      Swal.fire({
        title: '確定登出？',
        text: '確定要結束目前操作並回到主頁面嗎？',
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: '確定登出',
        cancelButtonText: '取消'
      }).then((result) => {
        if (result.isConfirmed) {
          location.reload();
        }
      });
    }

    /** Login Logic **/
    async function doLogin() {
      const mid = document.getElementById('mid').value;
      const yr = document.getElementById('birthYear').value;
      
      if (!mid || !yr) return Swal.fire('請填寫完整', '請輸入會員編號及出生年份', 'warning');

      Swal.fire({ title: '驗證中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      try {
        const res = await callGoogle('validateMember', [mid, yr]);
        if (res.success) {
          Swal.close();
          
          // Hide auth and entry buttons
          document.getElementById('auth-section').classList.add('hidden');
          document.getElementById('btn-history').classList.add('hidden');
          document.getElementById('btn-update').classList.add('hidden');
          
          // Show registration
          document.getElementById('reg-section').classList.remove('hidden');
          document.getElementById('welcome-msg').innerHTML = `您好，<span class="text-indigo-600">${res.userName}</span>`;
          
          // Populate existing profile data
          document.getElementById('userPhone').value = res.phone || "";
          document.getElementById('emeName').value = res.emergencyName || "";
          document.getElementById('emePhone').value = res.emergencyPhone || "";
          
          loadCourses();
        } else if (res.isNearMiss) {
          handleNearMiss(res.suggestedId, yr);
        } else {
          Swal.fire('驗證失敗', res.msg, 'error');
        }
      } catch (e) { Swal.fire('系統繁忙', '請稍後再試', 'error'); }
    }

    /** Course Management **/
    async function loadCourses() {
      const data = await callGoogle('getInitialData');
      coursesData = data;
      const sel = document.getElementById('courseSelect');
      sel.innerHTML = '<option value="">▼ 請選擇課程</option>' + 
        data.map(c => `<option value="${c.id}" ${c.isFull ? 'disabled class="text-slate-300"' : ''}>${c.name} (${c.statusText})</option>`).join('');
    }

    function onCourseChange() {
      const cid = document.getElementById('courseSelect').value;
      const course = coursesData.find(c => c.id === cid);
      const qDiv = document.getElementById('dynamicQuestions');
      const dline = document.getElementById('deadline');
      
      if (!course) { qDiv.classList.add('hidden'); dline.innerText = ""; return; }

      dline.innerText = "報名截止: " + course.closingDate;
      let qHtml = "";
      if (course.q1) qHtml += `<div class="bg-indigo-50 p-4 rounded-xl border-l-8 border-indigo-500"><label>${course.q1}</label><input type="text" id="ans1" placeholder="請填寫"></div>`;
      if (course.q2) qHtml += `<div class="bg-indigo-50 p-4 rounded-xl border-l-8 border-indigo-500"><label>${course.q2}</label><input type="text" id="ans2" placeholder="請填寫"></div>`;
      
      qDiv.innerHTML = qHtml;
      qDiv.classList.toggle('hidden', !qHtml);
    }

    /** Registration Submit **/
    async function doSubmit() {
      const mid = document.getElementById('mid').value;
      const cid = document.getElementById('courseSelect').value;
      const phone = document.getElementById('userPhone').value;

      if (!cid) return Swal.fire('尚未選擇課程', '', 'warning');
      if (phone.length < 8) return Swal.fire('電話格式錯誤', '請檢查您的聯絡電話', 'warning');

      const payload = {
        mid: mid,
        cid: cid,
        userPhone: phone,
        emeName: document.getElementById('emeName').value,
        emePhone: document.getElementById('emePhone').value,
        ans1: document.getElementById('ans1')?.value || "",
        ans2: document.getElementById('ans2')?.value || ""
      };

      Swal.fire({ title: '報名提交中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      
      try {
        const res = await callGoogle('registerUser', [payload]);
        Swal.fire(res.success ? '報名完成' : '提交失敗', res.msg, res.success ? 'success' : 'error').then(() => {
          if(res.success) location.reload();
        });
      } catch (e) { Swal.fire('網路錯誤', '無法提交報名', 'error'); }
    }

    /** Registration History **/
    async function showHistory() {
      const mid = document.getElementById('mid').value;
      const yr = document.getElementById('birthYear').value;
      if (!mid || !yr) return Swal.fire('提示', '請先輸入編號及年份以供查詢', 'info');

      Swal.fire({ title: '查詢中...', didOpen: () => Swal.showLoading() });
      try {
        const res = await callGoogle('checkUserRegistrations', [mid, yr]);
        Swal.close();
        
        let html = res.data.length ? '<div class="space-y-4">' : '<div class="py-12 text-slate-400">目前沒有報名紀錄</div>';
        res.data.forEach(item => {
          html += `<div class="p-4 border-2 rounded-2xl text-left bg-white shadow-sm">
            <div class="font-black text-xl text-indigo-950">${item.name}</div>
            <div class="flex justify-between items-center mt-3">
              <span class="${item.waitNumber > 0 ? 'text-orange-600' : 'text-emerald-600'} font-bold">
                ${item.waitNumber > 0 ? '候補第 ' + item.waitNumber + ' 位' : '正選確認'}
              </span>
              ${item.canCancel ? `<button onclick="cancelReg('${item.id}')" class="text-rose-500 font-black border-b-2 border-rose-100">取消報名</button>` : ''}
            </div>
          </div>`;
        });
        Swal.fire({ title: '報名紀錄', html: html + '</div>', showConfirmButton: false, showCloseButton: true, width: '90%' });
      } catch (e) { Swal.fire('連線錯誤', '讀取失敗', 'error'); }
    }

    async function cancelReg(cid) {
      const mid = document.getElementById('mid').value;
      const result = await Swal.fire({ title: '確認取消？', text: '取消後名額無法還原', icon: 'warning', showCancelButton: true });
      if (result.isConfirmed) {
        Swal.fire({ title: '處理中...', didOpen: () => Swal.showLoading() });
        const res = await callGoogle('deleteRegistration', [mid, cid]);
        Swal.fire(res.success ? '已取消' : '錯誤', res.message, res.success ? 'success' : 'error').then(() => showHistory());
      }
    }

    /** Contact Info Update **/
    async function handleUpdateContact() {
      const mid = document.getElementById('mid').value;
      const yr = document.getElementById('birthYear').value;
      if (!mid || !yr) return Swal.fire('驗證提示', '請在上方輸入編號及年份再按此按鈕', 'warning');

      Swal.fire({ title: '獲取資料中...', didOpen: () => Swal.showLoading() });
      try {
        const info = await callGoogle('getMemberContactInfo', [mid, yr]);
        Swal.close();
        if (!info.success) return Swal.fire('讀取失敗', info.message, 'error');

        Swal.fire({
          title: '更新聯絡資料',
          html: `<div class="space-y-4 text-left p-1">
            <div class="flex flex-col"><label class="text-sm">個人電話</label><input id="u_p" value="${info.phone}" class="swal2-input swal-custom-input" type="number" oninput="cInp(this, 10)"></div>
            <div class="flex flex-col"><label class="text-sm">緊急聯絡人</label><input id="u_en" value="${info.emName}" class="swal2-input swal-custom-input"></div>
            <div class="flex flex-col"><label class="text-sm">緊急電話</label><input id="u_ep" value="${info.emPhone}" class="swal2-input swal-custom-input" type="number" oninput="cInp(this, 10)"></div>
          </div>`,
          showCancelButton: true,
          confirmButtonText: '更新資料',
          cancelButtonText: '返回',
          preConfirm: () => {
            const data = { phone: document.getElementById('u_p').value, emName: document.getElementById('u_en').value, emPhone: document.getElementById('u_ep').value };
            if (data.phone.length < 8) return Swal.showValidationMessage('個人電話長度不足');
            if (!data.emName) return Swal.showValidationMessage('請輸入緊急聯絡人姓名');
            return data;
          }
        }).then(async (r) => {
          if (r.isConfirmed) {
            Swal.fire({ title: '更新中...', didOpen: () => Swal.showLoading() });
            const res = await callGoogle('updateMemberContactInfo', [mid, r.value.phone, r.value.emName, r.value.emPhone]);
            Swal.fire(res.success ? '已更新' : '更新失敗', res.message, res.success ? 'success' : 'error');
          }
        });
      } catch (e) { Swal.fire('網路錯誤', '無法聯繫伺服器', 'error'); }
    }

    /** Handle "Near Miss" IDs **/
    function handleNearMiss(id, yr) {
      Swal.fire({
        title: '查無資料',
        text: `編號 ${id} 尚未註冊，是否立即建立新會員？`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: '註冊帳號',
        cancelButtonText: '關閉'
      }).then(r => {
        if (r.isConfirmed) {
          Swal.fire({
            title: '會員基本資料',
            html: `<div class="space-y-4 text-left">
              <input id="n_name" placeholder="真實姓名" class="swal2-input swal-custom-input">
              <input id="n_phone" placeholder="聯絡電話" class="swal2-input swal-custom-input" type="number" oninput="cInp(this, 10)">
              <input id="n_emeName" placeholder="緊急聯絡人" class="swal2-input swal-custom-input">
              <input id="n_emePhone" placeholder="緊急電話" class="swal2-input swal-custom-input" type="number" oninput="cInp(this, 10)">
            </div>`,
            preConfirm: () => {
              const data = { name: document.getElementById('n_name').value, phone: document.getElementById('n_phone').value, emeName: document.getElementById('n_emeName').value, emePhone: document.getElementById('n_emePhone').value };
              if (!data.name || data.phone.length < 8) return Swal.showValidationMessage('請填寫正確姓名與電話');
              return data;
            }
          }).then(async (r2) => {
            if (r2.isConfirmed) {
              Swal.fire({ title: '資料建立中...', didOpen: () => Swal.showLoading() });
              const res = await callGoogle('createNewMember', [{ mid: id, name: r2.value.name, dob: yr + '-01-01', userPhone: r2.value.phone, emeName: r2.value.emeName, emePhone: r2.value.emePhone }]);
              Swal.fire(res.success ? '註冊成功' : '註冊失敗', res.msg, res.success ? 'success' : 'error').then(() => { if(res.success) doLogin(); });
            }
          });
        }
      });
    }
  </script>
</body>
</html>
