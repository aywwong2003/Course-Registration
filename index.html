<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>課程報名系統 | Registration System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="api.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
    body { background-color: #f1f5f9; font-family: 'Noto Sans TC', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
    label { font-size: 1.25rem !important; font-weight: 900 !important; color: #0f172a !important; display: block; margin-bottom: 0.75rem; line-height: 1.4; }
    .label-en { font-size: 0.95rem !important; font-weight: 500 !important; color: #64748b !important; display: block; margin-top: 0.1rem; }
    .course-card { transition: all 0.2s ease; border: 2px solid transparent; }
    .course-card:hover { border-color: #3b82f6; transform: translateY(-2px); }
  </style>
</head>
<body class="p-4 md:p-8">
  <div class="max-w-4xl mx-auto">
    <header class="mb-8 text-center">
      <h1 class="text-3xl font-black text-slate-900 mb-2">課程報名系統</h1>
      <p class="text-slate-500 font-bold">Course Registration System</p>
    </header>

    <div id="course-list" class="grid gap-6">
      <div class="text-center py-10 bg-white rounded-2xl shadow-sm">
        <p class="text-lg text-slate-600 animate-pulse">載入課程中... / Loading courses...</p>
      </div>
    </div>
  </div>

  <script>
    let allCourses = [];

    async function init() {
      try {
        // Fetch initial data from your Google Script
        const res = await callGoogle('getInitialData');
        if (res && res.courses) {
          allCourses = res.courses;
          renderCourses(allCourses);
        } else {
          document.getElementById('course-list').innerHTML = `
            <div class="bg-red-50 p-6 rounded-2xl text-center border-2 border-red-100">
              <p class="text-red-600 font-bold">目前沒有可報名的課程 / No courses available</p>
            </div>`;
        }
      } catch (err) {
        console.error(err);
        document.getElementById('course-list').innerHTML = '<p class="text-center text-red-500">載入失敗，請重試 / Load failed.</p>';
      }
    }

    function renderCourses(courses) {
      const container = document.getElementById('course-list');
      if (!courses || courses.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-500 py-10 bg-white rounded-2xl">目前無開放課程</p>';
        return;
      }

      let html = '';
      courses.forEach(c => {
        const full = c.currentCount >= (c.quota + (c.waitingQuota || 0));
        const statusText = c.isClosed ? '已截止 / Closed' : (full ? '名額已滿 / Full' : '報名中 / Open');
        const statusColor = c.isClosed ? 'bg-gray-100 text-gray-500' : (full ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-700');

        html += `
          <div class="bg-white p-6 rounded-3xl shadow-sm course-card flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex-1">
              <div class="flex items-center gap-3 mb-2">
                <span class="px-3 py-1 rounded-full text-xs font-black uppercase tracking-wider ${statusColor}">${statusText}</span>
                <span class="text-slate-400 font-bold text-sm">#${c.id}</span>
              </div>
              <h3 class="text-xl font-black text-slate-800 mb-1">${c.name}</h3>
              <p class="text-slate-500 font-bold text-sm">
                剩餘名額: ${Math.max(0, c.quota - c.currentCount)} / ${c.quota} 
                ${c.waitingQuota > 0 ? `(候補: ${c.waitingQuota})` : ''}
              </p>
            </div>
            <div>
              <button 
                onclick="startRegistration('${c.id}')"
                class="px-8 py-4 rounded-2xl font-black text-white transition-all shadow-lg active:scale-95 disabled:opacity-50 disabled:active:scale-100 ${c.isClosed ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 shadow-blue-200'}"
                ${c.isClosed ? 'disabled' : ''}
              >
                ${c.isClosed ? '暫不開放' : (full ? '申請候補' : '立即報名')}
              </button>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    async function startRegistration(cid) {
      const course = allCourses.find(c => String(c.id) === String(cid));
      if (!course) return;

      // Rest of your login / registration logic here...
      Swal.fire({
        title: '報名確認',
        text: `您選擇報名: ${course.name}`,
        icon: 'info',
        confirmButtonText: '下一步'
      });
    }

    window.onload = init;
  </script>
</body>
</html>
