<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>課程報名系統 | Registration System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="api.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
    body { background-color: #f1f5f9; font-family: 'Noto Sans TC', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
    
    label { font-size: 1.25rem !important; font-weight: 900 !important; color: #0f172a !important; display: block; margin-bottom: 0.75rem; line-height: 1.4; }
    .label-en { font-size: 0.95rem !important; font-weight: 500 !important; color: #64748b !important; display: block; margin-top: 0.1rem; }
    
    input, select { font-size: 1.35rem !important; width: 100%; height: 4.5rem; padding: 0 1.25rem; border-radius: 1rem; border: 4px solid #94a3b8; color: #000; background: #fff; transition: border-color 0.2s; }
    input:focus { border-color: #4f46e5; outline: none; }
    
    .radio-group { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 0.5rem; }
    .radio-item { flex: 1; min-width: 140px; position: relative; }
    .radio-item input { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }
    .radio-item label { 
      display: flex; flex-direction: column; align-items: center; justify-content: center; 
      background: white; border: 4px solid #cbd5e1; border-radius: 1.25rem; 
      padding: 1rem; cursor: pointer; transition: all 0.2s; font-size: 1.15rem !important;
      text-align: center; height: auto; min-height: 4.5rem; margin-bottom: 0 !important; font-weight: 700 !important;
    }
    .radio-item input:checked + label { 
      background: #4f46e5; color: white !important; border-color: #312e81; 
      box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
    }
    .radio-item input:checked + label .label-en { color: #e0e7ff !important; }

    .btn-main { height: 5.5rem; font-size: 1.6rem; font-weight: 900; border-radius: 1.5rem; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.1s; border: 4px solid transparent; cursor: pointer; line-height: 1.2; }
    .btn-main:active { transform: scale(0.96); }
    .btn-en { font-size: 0.9rem; font-weight: 500; opacity: 0.9; }
    
    .card { background: white; border-radius: 2rem; padding: 1.75rem; border: 3px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    .hidden { display: none !important; }
    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 100; display: flex; align-items: center; justify-content: center; }
    .swal-custom-input { font-size: 1.1rem !important; height: 3.5rem !important; margin: 0.5rem 0 !important; }
    
    .required::after { content: " *"; color: #e11d48; }
  </style>
</head>
<body>

  <div id="loading-status" class="loading-overlay">
    <div class="text-center">
      <div class="inline-block animate-spin rounded-full h-16 w-16 border-4 border-indigo-600 border-t-transparent"></div>
      <p class="mt-4 font-black text-indigo-900 text-xl">系統載入中...<br><span class="text-sm font-normal">Loading System...</span></p>
    </div>
  </div>

  <div class="min-h-screen px-4 pt-6 pb-10">
    <header class="text-center mb-8">
      <h1 class="text-3xl font-black text-indigo-900 tracking-tight">
        課程報名系統
        <span class="block text-xl font-bold opacity-70">Registration System</span>
      </h1>
    </header>

    <main class="max-w-2xl mx-auto space-y-6">
      <!-- Auth Section -->
      <section id="auth-section" class="card space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label>會員編號 (5位)<span class="label-en">Member ID (5 digits)</span></label>
            <input type="number" id="mid" placeholder="例: 10001" oninput="cInp(this, 5)" inputmode="numeric">
          </div>
          <div>
            <label>出生年份<span class="label-en">Birth Year (YYYY)</span></label>
            <input type="number" id="birthYear" placeholder="例: 1955" oninput="cInp(this, 4)" inputmode="numeric">
          </div>
        </div>
        <button id="login-btn" onclick="doLogin()" class="btn-main w-full bg-indigo-600 text-white shadow-xl shadow-indigo-200">
          確認登入
          <span class="btn-en">Login</span>
        </button>
      </section>

      <!-- Registration Section -->
      <section id="reg-section" class="hidden space-y-6">
        <div id="welcome-msg" class="text-2xl font-black text-center text-indigo-800 py-6 bg-indigo-50 rounded-2xl border-4 border-indigo-100 shadow-inner"></div>
        
        <div class="card space-y-8">
          <div>
            <label>1. 選擇課程<span class="label-en">Select Course</span></label>
            <select id="courseSelect" onchange="onCourseChange()">
              <option value="">載入中 / Loading...</option>
            </select>
            <p id="deadline" class="text-rose-600 font-bold mt-2 h-6 text-sm"></p>
          </div>

          <div id="dynamicQuestions" class="space-y-8 hidden"></div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-6 border-t-4 border-slate-100">
            <div class="bg-indigo-50 p-5 rounded-2xl border-2 border-indigo-100">
              <label class="text-lg">個人電話<span class="label-en">Personal Phone Number</span></label>
              <input type="number" id="userPhone" oninput="cInp(this, 10)" inputmode="numeric">
            </div>
            <div class="bg-slate-50 p-5 rounded-2xl border-2 border-slate-100">
              <label class="text-lg">緊急聯絡人姓名<span class="label-en">Emergency Contact Name</span></label>
              <input type="text" id="emeName" maxlength="30" class="mb-3">
              <label class="text-lg">緊急聯絡電話<span class="label-en">Emergency Contact No.</span></label>
              <input type="number" id="emePhone" oninput="cInp(this, 10)" inputmode="numeric">
            </div>
          </div>

          <button id="submit-btn" onclick="doSubmit()" class="btn-main w-full bg-emerald-600 text-white shadow-xl shadow-emerald-200">
            確認提交報名
            <span class="btn-en">Submit</span>
          </button>
          
          <button onclick="confirmExitToMain()" class="btn-main w-full bg-slate-200 text-slate-700 mt-4">
            返回主目錄
            <span class="btn-en">Back to Login</span>
          </button>
        </div>
      </section>

      <div id="bottom-utils" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <button id="btn-history" onclick="showHistory()" class="btn-main bg-white text-slate-700 border-4 border-slate-200 shadow-sm text-lg">
          查詢/取消報名
          <span class="btn-en">History / Cancel</span>
        </button>
        <button id="btn-update" onclick="handleUpdateContact()" class="btn-main bg-white text-slate-700 border-4 border-slate-200 shadow-sm text-lg">
          更新聯絡資料
          <span class="btn-en">Update Contact Info</span>
        </button>
      </div>
    </main>
  </div>

  <script>
    let coursesData = [];

    window.onload = async function() {
      try {
        await callGoogle('checkSystemStatus');
        document.getElementById('loading-status').classList.add('hidden');
      } catch (e) {
        document.getElementById('loading-status').innerHTML = '<div class="text-center"><p class="text-red-600 font-black">連線失敗 Connection Error</p></div>';
      }
    };

    function cInp(el, len) { el.value = el.value.replace(/\D/g,'').slice(0, len); }

    async function doLogin() {
      const mid = document.getElementById('mid').value;
      const yr = document.getElementById('birthYear').value;
      if (!mid || !yr) return Swal.fire('請輸入完整資料', 'Required', 'warning');

      Swal.fire({ title: '驗證中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      try {
        const res = await callGoogle('validateMember', [mid, yr]);
        if (res.success) {
          Swal.close();
          document.getElementById('auth-section').classList.add('hidden');
          document.getElementById('bottom-utils').classList.add('hidden');
          document.getElementById('reg-section').classList.remove('hidden');
          document.getElementById('welcome-msg').innerHTML = `👋 您好, <span class="text-indigo-600">${res.name || '會員'}</span>`;
          
          document.getElementById('userPhone').value = res.userPhone || "";
          document.getElementById('emeName').value = res.emeName || "";
          document.getElementById('emePhone').value = res.emePhone || "";
          
          loadCourses();
        } else if (res.isNearMiss) {
          handleNearMiss(res.suggestedId, yr);
        } else {
          Swal.fire('驗證失敗', res.msg, 'error');
        }
      } catch (e) { Swal.fire('連線錯誤', 'Error', 'error'); }
    }

    async function loadCourses() {
      try {
        const res = await callGoogle('getInitialData');
        coursesData = res.courses || (Array.isArray(res) ? res : []);
        
        const sel = document.getElementById('courseSelect');
        if (!coursesData.length) {
          sel.innerHTML = '<option value="">目前沒有開放課程</option>';
          return;
        }

        sel.innerHTML = '<option value="">▼ 請選擇課程 / Select Course</option>' + 
          coursesData.map(c => {
            const current = parseInt(c.currentCount) || 0;
            const quota = parseInt(c.quota) || 0;
            const waitQuota = parseInt(c.waitingQuota) || 0;
            const total = quota + waitQuota;
            
            let statusLabel = "";
            if (c.isClosed) statusLabel = "(已截止)";
            else if (current < quota) statusLabel = `(餘額: ${quota - current})`;
            else if (current < total) statusLabel = `(候補中: ${current - quota + 1})`;
            else statusLabel = "(名額已滿)";

            const isDisabled = c.isClosed || current >= total;
            return `<option value="${c.id}" ${isDisabled ? 'disabled style="color:#94a3b8"' : ''}>
              ${c.name} ${statusLabel}
            </option>`;
          }).join('');
      } catch (e) { 
        console.error(e);
        document.getElementById('courseSelect').innerHTML = '<option value="">載入失敗</option>';
      }
    }

    function onCourseChange() {
      const cid = document.getElementById('courseSelect').value;
      const course = coursesData.find(c => String(c.id) === String(cid));
      const qDiv = document.getElementById('dynamicQuestions');
      const dline = document.getElementById('deadline');
      
      if (!course) { qDiv.classList.add('hidden'); dline.innerText = ""; return; }
      dline.innerText = "截止日期 / Deadline: " + (course.closingDate || "N/A");
      
      let qHtml = "";
      [{ text: course.q1, req: course.q1Required, id: 'ans1' },
       { text: course.q2, req: course.q2Required, id: 'ans2' }].forEach((qObj) => {
        if (!qObj.text) return;
        const requiredClass = qObj.req ? 'required' : '';
        qHtml += `<div class="bg-indigo-50 p-6 rounded-3xl border-l-[12px] border-indigo-500 shadow-inner space-y-4">`;
        
        if (qObj.text.includes('|')) {
          const parts = qObj.text.split('|');
          qHtml += `<label class="${requiredClass}">${parts[0]}</label>`;
          if (parts.length > 4) {
             qHtml += `<select id="${qObj.id}" class="bg-white"><option value="">請選擇</option>`;
             parts.slice(1).forEach(o => qHtml += `<option value="${o}">${o}</option>`);
             qHtml += `</select>`;
          } else {
             qHtml += `<div class="radio-group">`;
             parts.slice(1).forEach((o, i) => {
               const uid = `${qObj.id}_${i}`;
               qHtml += `<div class="radio-item"><input type="radio" name="${qObj.id}" id="${uid}" value="${o}"><label for="${uid}">${o}</label></div>`;
             });
             qHtml += `</div>`;
          }
        } else {
          qHtml += `<label class="${requiredClass}">${qObj.text}</label><input type="text" id="${qObj.id}" class="border-4 border-indigo-200">`;
        }
        qHtml += `</div>`;
      });
      qDiv.innerHTML = qHtml;
      qDiv.classList.toggle('hidden', !qHtml);
    }

    function getVal(id) {
      const el = document.getElementById(id);
      if (el) return el.value;
      const radios = document.getElementsByName(id);
      for (const r of radios) if (r.checked) return r.value;
      return "";
    }

    async function doSubmit() {
      const cid = document.getElementById('courseSelect').value;
      if (!cid) return Swal.fire('請選擇課程', '', 'warning');
      const course = coursesData.find(c => String(c.id) === String(cid));
      
      const ans1 = getVal('ans1');
      const ans2 = getVal('ans2');
      if (course.q1 && course.q1Required && !ans1) return Swal.fire('請回答必填問題 1', '', 'warning');
      if (course.q2 && course.q2Required && !ans2) return Swal.fire('請回答必填問題 2', '', 'warning');

      const phone = document.getElementById('userPhone').value;
      const emName = document.getElementById('emeName').value;
      const emPhone = document.getElementById('emePhone').value;

      if (phone.length < 8) return Swal.fire('電話格式錯誤', '', 'warning');
      if (!emName || emPhone.length < 8) return Swal.fire('請填寫緊急聯絡資料', '', 'warning');

      const payload = {
        mid: document.getElementById('mid').value,
        cid: isNaN(cid) ? cid : Number(cid),
        userPhone: phone,
        emeName: emName,
        emePhone: emPhone,
        ans1: ans1,
        ans2: ans2
      };

      Swal.fire({ title: '提交報名中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      try {
        const res = await callGoogle('registerUser', [payload]);
        if (res.success) {
          Swal.fire('報名成功', res.msg, 'success').then(() => location.reload());
        } else {
          Swal.fire('報名失敗', res.msg, 'error');
        }
      } catch (e) {
        console.error(e);
        Swal.fire('系統錯誤', '後端伺服器回應異常，請聯絡管理員', 'error');
      }
    }

    async function showHistory() {
      const mid = document.getElementById('mid').value;
      const yr = document.getElementById('birthYear').value;
      if (!mid || !yr) return Swal.fire('請輸入編號及年份', '', 'info');
      Swal.fire({ title: '搜尋中...', didOpen: () => Swal.showLoading() });
      try {
        const res = await callGoogle('checkUserRegistrations', [mid, yr]);
        Swal.close();
        let html = res.data.length ? '<div class="space-y-4">' : '<div class="py-8 text-center text-gray-400">沒有報名紀錄</div>';
        res.data.forEach(item => {
          const statusText = item.waitNumber > 0 ? `候補第 ${item.waitNumber} 位` : '✅ 正選';
          html += `<div class="p-5 border-4 rounded-3xl text-left bg-white shadow-sm border-slate-100">
            <div class="font-black text-xl text-indigo-900">${item.name}</div>
            <div class="flex justify-between items-center mt-3">
              <span class="${item.waitNumber > 0 ? 'text-orange-600' : 'text-emerald-600'} font-bold">${statusText}</span>
              ${item.canCancel ? `<button onclick="cancelReg('${item.id}')" class="text-rose-500 font-bold border-2 border-rose-100 px-3 py-1 rounded-xl text-sm">取消報名</button>` : ''}
            </div>
          </div>`;
        });
        Swal.fire({ title: '報名紀錄', html: html + '</div>', showConfirmButton: false, showCloseButton: true });
      } catch (e) { Swal.fire('連線錯誤', '', 'error'); }
    }

    async function cancelReg(cid) {
      const mid = document.getElementById('mid').value;
      const pop = await Swal.fire({ title: '確定取消？', icon: 'warning', showCancelButton: true });
      if (pop.isConfirmed) {
        Swal.fire({ title: '處理中...', didOpen: () => Swal.showLoading() });
        const res = await callGoogle('deleteRegistration', [mid, cid]);
        Swal.fire(res.success?'成功':'失敗', res.message, res.success?'success':'error').then(() => showHistory());
      }
    }

    async function handleUpdateContact() {
      const mid = document.getElementById('mid').value;
      const yr = document.getElementById('birthYear').value;
      if (!mid || !yr) return Swal.fire('請輸入編號及年份', '', 'warning');
      Swal.fire({ title: '獲取中...', didOpen: () => Swal.showLoading() });
      try {
        const info = await callGoogle('getMemberContactInfo', [mid, yr]);
        Swal.close();
        if (!info.success) return Swal.fire('錯誤', info.message, 'error');
        
        const { value: formValues } = await Swal.fire({
          title: '更新聯絡資料',
          html: `<div class="space-y-4 text-left p-2">
            <label class="text-sm font-bold">個人電話</label>
            <input id="u_p" value="${info.phone}" class="swal2-input swal-custom-input" type="number">
            <label class="text-sm font-bold">緊急聯絡人姓名</label>
            <input id="u_en" value="${info.emName}" class="swal2-input swal-custom-input">
            <label class="text-sm font-bold">緊急聯絡電話</label>
            <input id="u_ep" value="${info.emPhone}" class="swal2-input swal-custom-input" type="number">
          </div>`,
          showCancelButton: true,
          preConfirm: () => ({
            p: document.getElementById('u_p').value,
            en: document.getElementById('u_en').value,
            ep: document.getElementById('u_ep').value
          })
        });

        if (formValues) {
          Swal.fire({ title: '儲存中...', didOpen: () => Swal.showLoading() });
          const res = await callGoogle('updateMemberContactInfo', [mid, formValues.p, formValues.en, formValues.ep]);
          Swal.fire(res.success?'成功':'失敗', res.message, res.success?'success':'error');
        }
      } catch (e) { Swal.fire('連線錯誤', '', 'error'); }
    }

    function handleNearMiss(id, yr) {
      Swal.fire({ 
        title: '找不到資料', 
        text: `編號 ${id} 尚未註冊，是否現在建立帳號？`, 
        icon: 'question', 
        showCancelButton: true 
      }).then(r => {
        if (r.isConfirmed) {
          Swal.fire({
            title: '會員註冊 (Register)',
            html: `<div class="space-y-4 text-left">
              <label class="text-sm font-bold">真實姓名 Name</label>
              <input id="n_name" placeholder="請輸入姓名" class="swal2-input swal-custom-input">
              <label class="text-sm font-bold">個人電話 Phone</label>
              <input id="n_phone" placeholder="請輸入電話" class="swal2-input swal-custom-input" type="number">
              <label class="text-sm font-bold">緊急聯絡人 Emergency Contact</label>
              <input id="n_emname" placeholder="請輸入姓名" class="swal2-input swal-custom-input">
              <label class="text-sm font-bold">緊急聯絡電話 Emergency Phone</label>
              <input id="n_emphone" placeholder="請輸入電話" class="swal2-input swal-custom-input" type="number">
            </div>`,
            showCancelButton: true,
            preConfirm: () => {
              const name = document.getElementById('n_name').value.trim();
              const phone = document.getElementById('n_phone').value.trim();
              const emName = document.getElementById('n_emname').value.trim();
              const emPhone = document.getElementById('n_emphone').value.trim();
              if (!name || phone.length < 8 || !emName || emPhone.length < 8) {
                Swal.showValidationMessage('請填寫完整且正確的資料');
              }
              return { name, phone, emName, emPhone };
            }
          }).then(async (r2) => {
            if (r2.isConfirmed) {
              Swal.fire({ title: '註冊中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
              try {
                const res = await callGoogle('createNewMember', [{ 
                  mid: id, name: r2.value.name, dob: yr + '-01-01', 
                  userPhone: r2.value.phone, emeName: r2.value.emName, emePhone: r2.value.emPhone
                }]);
                if (res.success) {
                  Swal.fire('註冊成功', res.msg, 'success').then(() => doLogin());
                } else {
                  Swal.fire('註冊失敗', res.msg, 'error');
                }
              } catch (e) {
                Swal.fire('連線錯誤', '無法完成註冊', 'error');
              }
            }
          });
        }
      });
    }

    function confirmExitToMain() { location.reload(); }
  </script>
</body>
</html>
