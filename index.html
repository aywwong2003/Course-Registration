<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>課程報名系統 | GitHub Version</title>
  <script src="api.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
    body { background-color: #f1f5f9; font-family: 'Noto Sans TC', sans-serif; margin: 0; padding: 0; }
    label { font-size: 1.3rem !important; font-weight: 900 !important; color: #1e293b !important; display: block; margin-bottom: 0.6rem; }
    input, select { font-size: 1.4rem !important; width: 100%; height: 4.8rem; padding: 0 1.25rem; border-radius: 1.25rem; border: 4px solid #cbd5e1; background: #fff; }
    .btn-primary { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; font-weight: 900; font-size: 1.5rem; padding: 1.3rem; border-radius: 1.5rem; width: 100%; transition: all 0.2s; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    .btn-primary:active { transform: scale(0.96); }
    .card { background: white; border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); padding: 2.2rem; }
    .swal-custom-input { font-size: 1.4rem !important; height: 4rem !important; border: 3px solid #94a3b8 !important; }
  </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex items-center justify-center">

  <div id="closed-screen" class="hidden fixed inset-0 bg-white z-50 flex flex-col items-center justify-center text-center p-6">
    <div class="text-black text-5xl font-black">系統維修中<br><span class="text-2xl font-bold text-slate-400">System Closed</span></div>
  </div>

  <div id="main-container" class="max-w-2xl w-full hidden">
    <div class="card">
      <h1 class="text-4xl font-black text-slate-900 text-center mb-1">課程報名系統</h1>
      <p class="text-slate-400 text-center mb-8 font-bold text-lg">Course Registration</p>
      
      <div id="app-content" class="space-y-6">
        <!-- 內容動態注入 -->
      </div>
    </div>
    <div class="mt-8 text-center text-slate-400 font-bold">
      Powered by Google Apps Script & GitHub
    </div>
  </div>

  <script>
    let globalCourses = [];
    let currentUser = null;

    window.onload = async function() {
      try {
        const isOpen = await callGoogle("checkSystemStatus");
        if (!isOpen) {
          document.getElementById('closed-screen').classList.remove('hidden');
          return;
        }
        document.getElementById('main-container').classList.remove('hidden');
        renderStep1();
      } catch (e) {
        Swal.fire("連線錯誤", "無法連接伺服器", "error");
      }
    };

    function renderStep1() {
      document.getElementById('app-content').innerHTML = `
        <div class="space-y-5">
          <div>
            <label>會員編號 Member ID</label>
            <input type="number" id="member-id-input" placeholder="請輸入編號" inputmode="numeric">
          </div>
          <button onclick="handleCheckID()" class="btn-primary mt-2">開始報名 / Start</button>
        </div>
      `;
    }

    async function handleCheckID() {
      const mid = document.getElementById('member-id-input').value;
      if (!mid) return Swal.fire("提示", "請輸入編號", "warning");
      Swal.fire({ title: '驗證中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      try {
        const check = await callGoogle("checkMemberAndRange", [mid]);
        if (check.type === 'INVALID') {
          Swal.fire("編號錯誤", "請確認編號是否正確", "error");
        } else if (check.type === 'NEW') {
          currentUser = { memberId: mid, isNew: true, name: "新會員" };
          proceedToSelection();
        } else {
          promptBirthYear(mid);
        }
      } catch (e) { Swal.fire("錯誤", e.message, "error"); }
    }

    function promptBirthYear(mid) {
      Swal.fire({
        title: '身分驗證',
        html: `<div class="mb-2 font-bold text-lg text-slate-600">請輸入出生年份 (西元)</div>
               <input type="number" id="swal-year" class="swal2-input swal-custom-input" placeholder="1960" inputmode="numeric">`,
        confirmButtonText: '確認',
        preConfirm: () => document.getElementById('swal-year').value || Swal.showValidationMessage('請輸入年份')
      }).then(r => { if(r.isConfirmed) verifyAndLoad(mid, r.value); });
    }

    async function verifyAndLoad(mid, year) {
      Swal.fire({ title: '驗證中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      try {
        const info = await callGoogle("validateMemberWithDOB", [mid, year]);
        if (!info.success) throw new Error(info.message);
        currentUser = { memberId: mid, name: info.name };
        proceedToSelection();
      } catch (e) { Swal.fire("失敗", e.message, "error"); }
    }

    async function proceedToSelection() {
      const content = document.getElementById('app-content');
      content.innerHTML = `<div class="text-center py-10 font-black animate-pulse text-2xl">載入中...</div>`;
      
      try {
        const data = await callGoogle("getInitialData");
        globalCourses = data.courses;
        
        content.innerHTML = `
          <div class="space-y-6">
            <div class="bg-slate-100 p-5 rounded-3xl">
              <div class="text-slate-500 font-bold text-sm mb-1">登入者 / User</div>
              <div class="text-2xl font-black text-slate-800">${currentUser.name} <span class="text-lg font-bold text-slate-400">#${currentUser.memberId}</span></div>
            </div>
            <div>
              <label>選擇課程 Select Course</label>
              <select id="course-select">
                <option value="">-- 請選擇 --</option>
                ${globalCourses.map(c => `<option value="${c.ID}" ${!c.canRegister ? 'disabled' : ''}>${c.CourseName} (剩 ${c.available > 0 ? c.available : 0} 名)</option>`).join('')}
              </select>
            </div>
            <button onclick="submitReg()" class="btn-primary">確認報名 / Register</button>
            <div class="grid grid-cols-2 gap-4 mt-4">
              <button onclick="showMyHistory()" class="bg-blue-50 text-blue-600 font-black py-4 rounded-2xl border-2 border-blue-100 text-lg">我的紀錄</button>
              <button onclick="location.reload()" class="bg-slate-50 text-slate-400 font-black py-4 rounded-2xl border-2 border-slate-100 text-lg">返回</button>
            </div>
          </div>
        `;
      } catch (e) { Swal.fire("錯誤", "載入失敗", "error"); }
    }

    async function submitReg() {
      const cid = document.getElementById('course-select').value;
      if (!cid) return Swal.fire("請選擇課程", "", "warning");
      const course = globalCourses.find(c => c.ID.toString() === cid.toString());

      Swal.fire({
        title: '確定報名？',
        text: course.CourseName,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: '提交',
        cancelButtonText: '取消'
      }).then(async r => {
        if(r.isConfirmed) {
          Swal.fire({ title: '處理中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
          try {
            const res = await callGoogle("registerCourse", [currentUser.memberId, currentUser.name, cid, course.CourseName]);
            Swal.fire(res.success ? "成功" : "提示", res.message, res.success ? "success" : "info").then(() => proceedToSelection());
          } catch (e) { Swal.fire("錯誤", "報名失敗", "error"); }
        }
      });
    }

    async function showMyHistory() {
      Swal.fire({ title: '載入紀錄...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      try {
        const regs = await callGoogle("checkUserRegistrations", [currentUser.memberId]);
        let html = '<div class="space-y-3 mt-4">';
        if (regs.length === 0) html += '<p class="text-center font-bold text-slate-400 py-4">目前沒有紀錄</p>';
        else {
          regs.forEach(r => {
            html += `
              <div class="p-4 bg-slate-50 rounded-2xl text-left border-2 border-slate-100">
                <div class="font-black text-xl text-slate-800">${r.name}</div>
                <div class="flex justify-between items-center mt-2">
                  <span class="font-bold text-blue-600">● ${r.status}</span>
                  <button onclick="handleCancel('${r.id}')" class="text-rose-500 font-black px-4 py-1 rounded-xl bg-rose-50 border border-rose-100">取消</button>
                </div>
              </div>`;
          });
        }
        html += '</div>';
        Swal.fire({ title: '您的報名紀錄', html, confirmButtonText: '關閉' });
      } catch (e) { Swal.fire("錯誤", "無法讀取紀錄", "error"); }
    }

    async function handleCancel(cid) {
      const r = await Swal.fire({ title: '確定取消？', text: '取消後名額將釋出', icon: 'warning', showCancelButton: true });
      if (r.isConfirmed) {
        Swal.fire({ title: '處理中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        await callGoogle("cancelRegistration", [currentUser.memberId, cid]);
        Swal.fire("已取消", "", "success").then(() => showMyHistory());
      }
    }
  </script>
</body>
</html>
