<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>課程報名系統 | GitHub 版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- 引入 GitHub API 橋接器 -->
  <script src="api.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
    body { background-color: #f1f5f9; font-family: 'Noto Sans TC', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
    label { font-size: 1.25rem !important; font-weight: 900 !important; color: #0f172a !important; display: block; margin-bottom: 0.5rem; }
    input, select { font-size: 1.35rem !important; width: 100%; height: 4.5rem; padding: 0 1.25rem; border-radius: 1rem; border: 4px solid #94a3b8; color: #000; background: #fff; }
    .btn-main { height: 5rem; font-size: 1.5rem; font-weight: 900; border-radius: 1.25rem; display: flex; align-items: center; justify-content: center; transition: all 0.1s; }
    .btn-main:active { transform: scale(0.95); }
    .card { background: white; border-radius: 2rem; padding: 1.5rem; border: 3px solid #e2e8f0; }
    .hidden { display: none !important; }
    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 50; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>

  <div id="loading-status" class="loading-overlay">
    <div class="text-center">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent"></div>
      <p class="mt-4 font-bold text-indigo-900">系統初始化中...</p>
    </div>
  </div>

  <div class="min-h-screen px-4 pt-6 pb-10">
    <header class="text-center mb-6">
      <h1 class="text-3xl font-black text-indigo-900">課程報名系統<br><span class="text-xl">Registration System</span></h1>
    </header>

    <main class="max-w-2xl mx-auto space-y-6">
      <!-- 登入區塊 -->
      <section id="auth-section" class="card space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label>會員編號 (5位)</label>
            <input type="number" id="mid" placeholder="編號" oninput="cInp(this, 5)" inputmode="numeric">
          </div>
          <div>
            <label>出生年份 (YYYY)</label>
            <input type="number" id="birthYear" placeholder="例: 1955" oninput="cInp(this, 4)" inputmode="numeric">
          </div>
        </div>
        <button onclick="doLogin()" class="btn-main w-full bg-indigo-600 text-white shadow-lg">確認登入 / Login</button>
      </section>

      <!-- 報名區塊 -->
      <section id="reg-section" class="hidden space-y-6">
        <div id="welcome-msg" class="text-2xl font-black text-center text-indigo-700 py-4 bg-indigo-50 rounded-2xl border-4 border-indigo-200"></div>
        
        <div class="card space-y-6">
          <div>
            <label>1. 選擇課程</label>
            <select id="courseSelect" onchange="onCourseChange()"><option value="">載入中...</option></select>
            <p id="deadline" class="text-rose-600 font-bold mt-2"></p>
          </div>

          <div id="dynamicQuestions" class="space-y-4 hidden"></div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-indigo-50 p-4 rounded-xl border-2 border-indigo-100">
              <label class="text-lg">個人電話</label>
              <input type="number" id="userPhone" oninput="cInp(this, 10)" inputmode="numeric">
            </div>
            <div class="bg-slate-50 p-4 rounded-xl border-2 border-slate-100">
              <label class="text-lg">緊急聯絡人姓名</label>
              <input type="text" id="emeName" maxlength="30" class="mb-2">
              <label class="text-lg">緊急聯絡電話</label>
              <input type="number" id="emePhone" oninput="cInp(this, 10)" inputmode="numeric">
            </div>
          </div>

          <button onclick="doSubmit()" class="btn-main w-full bg-emerald-600 text-white">確認提交報名 / Submit</button>
        </div>
      </section>

      <!-- 功能按鈕區 -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <button id="btn-history" onclick="showHistory()" class="btn-main bg-white text-slate-700 border-4 border-slate-200">查詢/取消報名</button>
        <button id="btn-update" onclick="handleUpdateContact()" class="btn-main bg-white text-slate-700 border-4 border-slate-200">更新聯絡資料</button>
        <button id="btn-exit" onclick="location.reload()" class="btn-main bg-slate-100 text-slate-500 col-span-full">登出系統 / Logout</button>
      </div>
    </main>
  </div>

  <script>
    let sysConfig = { registrationEnabled: true };
    let coursesData = [];

    // 初始化：檢查系統狀態
    window.onload = async function() {
      try {
        const res = await callGoogle('checkSystemStatus');
        sysConfig.registrationEnabled = res.registrationEnabled;
        document.getElementById('loading-status').classList.add('hidden');
        if (!sysConfig.registrationEnabled) {
          Swal.fire('系統維護中', '目前暫不開放報名，請稍後再試。', 'info');
        }
      } catch (e) {
        document.getElementById('loading-status').innerHTML = '<p class="text-red-500 font-bold">連線失敗，請重新整理</p>';
      }
    };

    function cInp(el, len) {
      el.value = el.value.replace(/\D/g,'').slice(0, len);
    }

    async function doLogin() {
      const mid = document.getElementById('mid').value;
      const yr = document.getElementById('birthYear').value;
      if (mid.length !== 5 || yr.length !== 4) return Swal.fire('資料不全', '請輸入5位編號與4位年份', 'warning');

      Swal.fire({ title: '核對中...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      try {
        const res = await callGoogle('validateMember', [mid, yr]);
        if (res.success) {
          Swal.close();
          document.getElementById('auth-section').classList.add('hidden');
          document.getElementById('reg-section').classList.remove('hidden');
          document.getElementById('welcome-msg').innerText = "👋 您好，" + res.userName;
          
          document.getElementById('userPhone').value = res.phone || "";
          document.getElementById('emeName').value = res.emergencyName || "";
          document.getElementById('emePhone').value = res.emergencyPhone || "";
          
          loadCourses();
        } else if (res.isNearMiss) {
          handleNearMiss(res.suggestedId, yr);
        } else {
          Swal.fire('驗證失敗', res.msg, 'error');
        }
      } catch (e) {
        Swal.fire('錯誤', '連線異常', 'error');
      }
    }

    async function loadCourses() {
      const data = await callGoogle('getInitialData');
      coursesData = data;
      const sel = document.getElementById('courseSelect');
      sel.innerHTML = '<option value="">▼ 請選擇課程</option>' + 
        data.map(c => `<option value="${c.id}" ${c.isFull ? 'disabled' : ''}>${c.name} (${c.statusText})</option>`).join('');
    }

    function onCourseChange() {
      const cid = document.getElementById('courseSelect').value;
      const course = coursesData.find(c => c.id === cid);
      const qDiv = document.getElementById('dynamicQuestions');
      const dline = document.getElementById('deadline');
      
      if (!course) {
        qDiv.classList.add('hidden');
        dline.innerText = "";
        return;
      }

      dline.innerText = "截止日期: " + course.closingDate;
      let qHtml = "";
      if (course.q1) qHtml += `<div class="bg-indigo-50 p-4 rounded-xl border-l-8 border-indigo-500"><label>${course.q1}</label><input type="text" id="ans1" class="bg-white"></div>`;
      if (course.q2) qHtml += `<div class="bg-indigo-50 p-4 rounded-xl border-l-8 border-indigo-500"><label>${course.q2}</label><input type="text" id="ans2" class="bg-white"></div>`;
      
      qDiv.innerHTML = qHtml;
      qDiv.classList.toggle('hidden', !qHtml);
    }

    async function doSubmit() {
      const cid = document.getElementById('courseSelect').value;
      if (!cid) return Swal.fire('提示', '請選擇課程', 'warning');

      const payload = {
        mid: document.getElementById('mid').value,
        cid: cid,
        userPhone: document.getElementById('userPhone').value,
        emeName: document.getElementById('emeName').value,
        emePhone: document.getElementById('emePhone').value,
        ans1: document.getElementById('ans1')?.value || "",
        ans2: document.getElementById('ans2')?.value || ""
      };

      Swal.fire({ title: '提交中...', didOpen: () => Swal.showLoading() });
      const res = await callGoogle('registerUser', [payload]);
      Swal.fire(res.success ? '成功' : '失敗', res.msg, res.success ? 'success' : 'error').then(() => {
        if(res.success) location.reload();
      });
    }

    async function showHistory() {
      const mid = document.getElementById('mid').value;
      const yr = document.getElementById('birthYear').value;
      if (!mid || !yr) return Swal.fire('請先登入', '', 'info');

      Swal.fire({ title: '讀取紀錄...', didOpen: () => Swal.showLoading() });
      const res = await callGoogle('checkUserRegistrations', [mid, yr]);
      Swal.close();

      let html = res.data.length ? '<div class="space-y-3">' : '尚無報名紀錄';
      res.data.forEach(item => {
        const status = item.waitNumber > 0 ? `<span class="text-orange-600">候補第 ${item.waitNumber} 位</span>` : '<span class="text-emerald-600">正選名單</span>';
        html += `<div class="p-4 border-2 rounded-xl text-left bg-slate-50">
          <div class="font-black text-lg">${item.name}</div>
          <div class="flex justify-between items-center mt-2">
            ${status}
            ${item.canCancel ? `<button onclick="cancelReg('${item.id}')" class="text-rose-500 font-bold border-b-2 border-rose-500">取消報名</button>` : ''}
          </div>
        </div>`;
      });
      Swal.fire({ title: '您的報名紀錄', html: html + '</div>', showConfirmButton: false, showCloseButton: true });
    }

    async function cancelReg(cid) {
      const mid = document.getElementById('mid').value;
      const res = await callGoogle('deleteRegistration', [mid, cid]);
      if (res.success) Swal.fire('已取消', '', 'success').then(() => showHistory());
    }

    async function handleUpdateContact() {
      const mid = document.getElementById('mid').value;
      const yr = document.getElementById('birthYear').value;
      if (!mid || !yr) return Swal.fire('請先登入', '', 'info');

      const info = await callGoogle('getMemberContactInfo', [mid, yr]);
      if (!info.success) return Swal.fire('驗證錯誤', '', 'error');

      Swal.fire({
        title: '更新聯絡資料',
        html: `<div class="space-y-4 text-left">
          <div><label class="text-sm">個人電話</label><input id="u_p" value="${info.phone}" class="swal2-input m-0 w-full" type="number"></div>
          <div><label class="text-sm">緊急聯絡人</label><input id="u_en" value="${info.emName}" class="swal2-input m-0 w-full"></div>
          <div><label class="text-sm">緊急電話</label><input id="u_ep" value="${info.emPhone}" class="swal2-input m-0 w-full" type="number"></div>
        </div>`,
        preConfirm: () => ({
          phone: document.getElementById('u_p').value,
          emName: document.getElementById('u_en').value,
          emPhone: document.getElementById('u_ep').value
        })
      }).then(async (r) => {
        if (r.isConfirmed) {
          const res = await callGoogle('updateMemberContactInfo', [mid, r.value.phone, r.value.emName, r.value.emPhone]);
          Swal.fire(res.success ? '成功' : '失敗', res.message, res.success ? 'success' : 'error');
        }
      });
    }

    function handleNearMiss(id, yr) {
      Swal.fire({
        title: '找不到此編號',
        text: `編號 ${id} 尚未註冊，是否現在建立新帳號？`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: '註冊新帳號'
      }).then(r => {
        if (r.isConfirmed) {
          Swal.fire({
            title: '新會員註冊',
            html: `<input id="n_name" placeholder="姓名" class="swal2-input">
                   <input id="n_phone" placeholder="電話" class="swal2-input" type="number">`,
            preConfirm: () => ({ name: document.getElementById('n_name').value, phone: document.getElementById('n_phone').value })
          }).then(async (r2) => {
            if (r2.isConfirmed) {
              const res = await callGoogle('createNewMember', [{ mid: id, name: r2.value.name, dob: yr + '-01-01', userPhone: r2.value.phone, emeName: '', emePhone: '' }]);
              Swal.fire('完成', res.msg, 'success');
            }
          });
        }
      });
    }
  </script>
</body>
</html>
